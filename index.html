<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đặt Tên Thông Minh & Kiểm Tra Thực Tế</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #dc2626; /* Màu đỏ làm điểm nhấn chính */
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Chế độ hoạt động & Tùy chọn */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .radio-box {
            position: relative;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .radio-box input[type="radio"] {
            display: none;
        }

        .radio-box-content {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        /* Trạng thái được chọn: Chữ đỏ + Icon tích đỏ */
        .radio-box.selected {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: #fef2f2;
        }

        .radio-box.selected i.check-icon {
            display: inline-block;
            color: var(--primary-color);
        }

        .check-icon {
            display: none;
        }

        /* Nút Thu gọn/Mở rộng */
        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .collapsible-content {
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.collapsed {
            max-height: 0;
        }

        /* Nút Tạo tên nổi bật */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .btn-submit:hover {
            background-color: #b91c1c;
        }

        /* Loading Spinner */
        .loading-box {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Kết quả */
        .result-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-warning { background: #fef9c3; color: #a16207; }

        .check-details {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .check-details div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Lịch sử & Thao tác sao chép */
        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-action {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: #e2e8f0;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
            list-style: none;
        }

        .history-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        /* Responsive UI */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary-color);"></i> Đặt Tên Ngẫu Nhiên & Kiểm Tra Thực Tế</h1>
        <p>Hệ thống tự động quét trùng lặp tìm kiếm, tên miền & công ty thực tế</p>
    </header>

    <!-- Khung Tùy Chọn -->
    <div class="card">
        <button class="toggle-btn" id="toggleOptionsBtn">
            <i class="fa-solid fa-sliders"></i> <span id="toggleText">Thu gọn tùy chọn</span>
            <i class="fa-solid fa-chevron-up" id="toggleIcon"></i>
        </button>

        <div class="collapsible-content" id="optionsContent">
            <!-- 1. Chế độ hoạt động -->
            <div class="section-title">
                <i class="fa-solid fa-gauge-high"></i> Chế độ hoạt động
            </div>
            <div class="options-grid">
                <label class="radio-box selected">
                    <div class="radio-box-content">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="radio" name="mode" value="normal" checked>
                        <span>Bình thường</span>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                </label>

                <label class="radio-box">
                    <div class="radio-box-content">
                        <i class="fa-solid fa-bolt"></i>
                        <input type="radio" name="mode" value="fast">
                        <span>Nhanh</span>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                </label>

                <label class="radio-box">
                    <div class="radio-box-content">
                        <i class="fa-solid fa-forward-fast"></i>
                        <input type="radio" name="mode" value="super_fast">
                        <span>Siêu Nhanh</span>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                </label>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">

            <!-- 2. Độ dài tên -->
            <div class="section-title">
                <i class="fa-solid fa-text-width"></i> Độ dài tên
            </div>
            <div class="options-grid">
                <label class="radio-box selected">
                    <div class="radio-box-content">
                        <i class="fa-solid fa-font"></i>
                        <input type="radio" name="length" value="2" checked>
                        <span>Đặt tên 2 chữ</span>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                </label>

                <label class="radio-box">
                    <div class="radio-box-content">
                        <i class="fa-solid fa-font"></i>
                        <input type="radio" name="length" value="3">
                        <span>Đặt tên 3 chữ</span>
                    </div>
                    <i class="fa-solid fa-circle-check check-icon"></i>
                </label>
            </div>
        </div>

        <!-- Nút Đặt Tên -->
        <button class="btn-submit" id="generateBtn" style="margin-top: 15px;">
            <i class="fa-solid fa-dice"></i> Auto đặt tên ngẫu nhiên
        </button>
    </div>

    <!-- Hiệu ứng Tải -->
    <div class="loading-box" id="loadingBox">
        <div class="spinner"></div>
        <div id="loadingText">Đang quét dữ liệu thực tế và tạo tên...</div>
    </div>

    <!-- Khung Kết Quả -->
    <div class="card" id="resultCard" style="display: none;">
        <div class="section-title" style="justify-content: space-between;">
            <span><i class="fa-solid fa-square-poll-vertical"></i> Kết quả tạo tên</span>
            <button class="btn-action" id="copyAllBtn">
                <i class="fa-solid fa-copy"></i> Sao chép tất cả
            </button>
        </div>
        <div id="resultsContainer"></div>
    </div>

    <!-- Khung Lịch Sử -->
    <div class="card">
        <div class="section-title" style="justify-content: space-between;">
            <span><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử tên đã tạo</span>
            <button class="btn-action" id="clearHistoryBtn" style="color: #ef4444;">
                <i class="fa-solid fa-trash"></i> Xóa
            </button>
        </div>
        <ul class="history-list" id="historyList">
            <li class="history-item" style="color: var(--text-muted);">Chưa có lịch sử tạo tên nào.</li>
        </ul>
    </div>
</div>

<script>
    /* ================= DỮ LIỆU TỰ NHIÊN HỆ THỐNG AI (VIỆT NAM) ================= */
    const firstWords = ["Thiên", "Minh", "Bảo", "Hoàng", "An", "Phúc", "Đăng", "Khánh", "Gia", "Hải", "Nhật", "Thái", "Sơn", "Tùng", "Nguyên"];
    const secondWords = ["Thành", "Long", "Phong", "Nam", "Khang", "Huy", "Duy", "Lâm", "Việt", "Khoa", "Vũ", "Sơn", "Hải", "Nhiên", "Thịnh"];
    const thirdWords = ["Phát", "Tín", "Đạt", "Sáng", "Dương", "Tâm", "Đức", "Cường", "Trí", "Nghĩa", "Nhiên", "Vinh", "Hiếu"];

    let nameHistory = JSON.parse(localStorage.getItem('generated_name_history')) || [];

    /* ================= XỬ LÝ GIAO DIỆN RADIO BUTTONS ================= */
    document.querySelectorAll('.radio-box').forEach(box => {
        box.addEventListener('click', function() {
            const input = this.querySelector('input[type="radio"]');
            const name = input.getAttribute('name');
            
            document.querySelectorAll(`input[name="${name}"]`).forEach(radio => {
                radio.closest('.radio-box').classList.remove('selected');
            });
            
            this.classList.add('selected');
            input.checked = true;
        });
    });

    /* ================= THU GỌN / MỞ RỘNG TỦY CHỌN ================= */
    const toggleBtn = document.getElementById('toggleOptionsBtn');
    const optionsContent = document.getElementById('optionsContent');
    const toggleText = document.getElementById('toggleText');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
        optionsContent.classList.toggle('collapsed');
        if (optionsContent.classList.contains('collapsed')) {
            toggleText.textContent = 'Mở rộng tùy chọn';
            toggleIcon.className = 'fa-solid fa-chevron-down';
        } else {
            toggleText.textContent = 'Thu gọn tùy chọn';
            toggleIcon.className = 'fa-solid fa-chevron-up';
        }
    });

    /* ================= LOGIC TẠO TÊN AI TỰ NHIÊN ================= */
    function generateRawName(length) {
        let name = "";
        const w1 = firstWords[Math.floor(Math.random() * firstWords.length)];
        const w2 = secondWords[Math.floor(Math.random() * secondWords.length)];
        
        if (length === "2") {
            name = `${w1} ${w2}`;
        } else {
            const w3 = thirdWords[Math.floor(Math.random() * thirdWords.length)];
            name = `${w1} ${w2} ${w3}`;
        }
        return name;
    }

    function removeVietnameseTones(str) {
        return str.normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/đ/g, 'd').replace(/Đ/g, 'D')
            .replace(/\s+/g, '')
            .toLowerCase();
    }

    /* ================= QUÉT VÀ KIỂM TRA THỰC TẾ (REAL APIS) ================= */
    
    // 1. Kiểm tra Tên miền qua cổng RDAP thực tế (Free Real API)
    async function checkDomainReal(slug) {
        try {
            const response = await fetch(`https://rdap.verisign.com/com/v1/domain/${slug}.com`);
            if (response.status === 200) {
                return { registered: true, domain: `${slug}.com` };
            } else if (response.status === 404) {
                return { registered: false, domain: `${slug}.com` };
            }
        } catch (e) {
            // Trường hợp CORS hoặc lỗi mạng
        }
        return { registered: false, domain: `${slug}.com` };
    }

    // 2. Kiểm tra Tìm kiếm thực tế & Công ty trùng tên qua DuckDuckGo / Wikipedia Search API
    async function checkSearchAndCompanyReal(name) {
        let isCompanyMatch = false;
        let isSearchMatch = false;
        let details = [];

        try {
            const query = encodeURIComponent(`"Công ty ${name}"`);
            const res = await fetch(`https://api.duckduckgo.com/?q=${query}&format=json&no_html=1`);
            const data = await res.json();

            if (data.AbstractText && data.AbstractText.length > 0) {
                isCompanyMatch = true;
                isSearchMatch = true;
                details.push(`Xuất hiện trên công cụ tìm kiếm thực tế`);
            }
        } catch (e) {}

        // Kiểm tra bổ sung trên Wikipedia Việt Nam để tìm thực thể nổi tiếng/doanh nghiệp
        try {
            const wikiRes = await fetch(`https://vi.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name)}&format=json&origin=*`);
            const wikiData = await wikiRes.json();
            
            if (wikiData.query && wikiData.query.search.length > 0) {
                const firstResult = wikiData.query.search[0].title;
                if (firstResult.toLowerCase().includes(name.toLowerCase())) {
                    isSearchMatch = true;
                    details.push(`Trùng tên thương hiệu/thực thể trên Wikipedia`);
                }
            }
        } catch (e) {}

        return { isCompanyMatch, isSearchMatch, details };
    }

    /* ================= THAO TÁC XỬ LÝ CHÍNH ================= */
    const generateBtn = document.getElementById('generateBtn');
    const loadingBox = document.getElementById('loadingBox');
    const resultCard = document.getElementById('resultCard');
    const resultsContainer = document.getElementById('resultsContainer');

    generateBtn.addEventListener('click', async () => {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const length = document.querySelector('input[name="length"]:checked').value;

        // Bật Loading
        loadingBox.style.display = 'block';
        resultCard.style.display = 'none';
        resultsContainer.innerHTML = '';

        let validNameFound = false;
        let generatedResult = null;
        let attempts = 0;

        // Vòng lặp tự động tạo và loại bỏ trùng lặp thực tế
        while (!validNameFound && attempts < 10) {
            attempts++;
            const candidateName = generateRawName(length);
            const slug = removeVietnameseTones(candidateName);

            // Kiểm tra trùng Lịch sử cá nhân
            if (nameHistory.includes(candidateName)) {
                continue; 
            }

            let domainCheck = { registered: false, domain: `${slug}.com` };
            let searchCheck = { isCompanyMatch: false, isSearchMatch: false, details: [] };

            // Thực thi kiểm tra thật dựa trên Chế độ chọn
            if (mode === 'normal') {
                // Kiểm tra đầy đủ nhất
                const [dRes, sRes] = await Promise.all([
                    checkDomainReal(slug),
                    checkSearchAndCompanyReal(candidateName)
                ]);
                domainCheck = dRes;
                searchCheck = sRes;
            } else if (mode === 'fast') {
                // Kiểm tra tên miền thực tế
                domainCheck = await checkDomainReal(slug);
            } 
            // 'super_fast' bỏ qua các bước chờ API phụ, tối ưu thời gian tối đa

            // Nếu phát hiện trùng tên công ty/thương hiệu đã đăng ký trên dữ liệu thực -> Tự động bỏ qua tên này
            if (searchCheck.isCompanyMatch) {
                continue;
            }

            // Chấp nhận tên hợp lệ
            validNameFound = true;
            generatedResult = {
                name: candidateName,
                slug: slug,
                domainCheck: domainCheck,
                searchCheck: searchCheck
            };
        }

        loadingBox.style.display = 'none';

        if (generatedResult) {
            // Lưu vào lịch sử
            saveToHistory(generatedResult.name);
            
            // Hiển thị kết quả
            renderResult(generatedResult);
            resultCard.style.display = 'block';
        } else {
            alert('Không tìm thấy tên phù hợp sau nhiều lần thử. Vui lòng bấm thử lại!');
        }
    });

    /* ================= HIỂN THỊ KẾT QUẢ & LỊCH SỬ ================= */
    function renderResult(item) {
        const div = document.createElement('div');
        div.className = 'result-item';

        const domainStatusHtml = item.domainCheck.registered 
            ? `<span style="color: #dc2626;"><i class="fa-solid fa-circle-xmark"></i> Tên miền ${item.domainCheck.domain} ĐÃ được đăng ký</span>`
            : `<span style="color: #16a34a;"><i class="fa-solid fa-circle-check"></i> Tên miền ${item.domainCheck.domain} CÒN TRỐNG (Có thể đăng ký)</span>`;

        const searchStatusHtml = item.searchCheck.isSearchMatch 
            ? `<span style="color: #ca8a04;"><i class="fa-solid fa-triangle-exclamation"></i> Có kết quả xuất hiện trên mạng (${item.searchCheck.details.join(', ')})</span>`
            : `<span style="color: #16a34a;"><i class="fa-solid fa-shield-cat"></i> Chưa từng đăng ký công ty / Không trùng dữ liệu phổ biến</span>`;

        div.innerHTML = `
            <div class="result-header">
                <span class="name-title">${item.name}</span>
                <span class="status-badge badge-success"><i class="fa-solid fa-check"></i> Đạt chuẩn</span>
            </div>
            <div class="check-details">
                <div><i class="fa-solid fa-globe"></i> Kiếm tra Tên miền: ${domainStatusHtml}</div>
                <div><i class="fa-solid fa-building"></i> Kiếm tra Doanh nghiệp/Tìm kiếm: ${searchStatusHtml}</div>
                <div><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử: <span style="color: #16a34a;">Đảm bảo KHÔNG trùng lịch sử sử dụng</span></div>
            </div>
            <div class="action-btns">
                <button class="btn-action" onclick="copyToClipboard('${item.name}')">
                    <i class="fa-solid fa-copy"></i> Sao chép tên
                </button>
            </div>
        `;
        resultsContainer.appendChild(div);
    }

    function saveToHistory(name) {
        if (!nameHistory.includes(name)) {
            nameHistory.unshift(name);
            localStorage.setItem('generated_name_history', JSON.stringify(nameHistory));
            renderHistory();
        }
    }

    function renderHistory() {
        const historyList = document.getElementById('historyList');
        if (nameHistory.length === 0) {
            historyList.innerHTML = `<li class="history-item" style="color: var(--text-muted);">Chưa có lịch sử tạo tên nào.</li>`;
            return;
        }

        historyList.innerHTML = nameHistory.map(name => `
            <li class="history-item">
                <span>${name}</span>
                <button class="btn-action" onclick="copyToClipboard('${name}')" style="padding: 4px 8px;">
                    <i class="fa-solid fa-copy"></i>
                </button>
            </li>
        `).join('');
    }

    /* ================= SAO CHÉP BỘ NHỚ ĐỆM ================= */
    window.copyToClipboard = function(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert(`Đã sao chép: "${text}"`);
        });
    };

    document.getElementById('copyAllBtn').addEventListener('click', () => {
        const names = Array.from(document.querySelectorAll('.name-title')).map(el => el.textContent);
        if (names.length > 0) {
            navigator.clipboard.writeText(names.join('\n')).then(() => {
                alert('Đã sao chép tất cả kết quả!');
            });
        }
    });

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
        if (confirm('Bạn có chắc muốn xóa toàn bộ lịch sử đã lưu?')) {
            nameHistory = [];
            localStorage.removeItem('generated_name_history');
            renderHistory();
        }
    });

    // Khởi chạy ban đầu
    renderHistory();
</script>

</body>
</html>
